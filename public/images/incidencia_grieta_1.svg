<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="800" height="450" fill="#f8fafc" rx="8"/>
  <!-- Grid background -->
  <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450 M 450 0 L 450 450 M 500 0 L 500 450 M 550 0 L 550 450 M 600 0 L 600 450 M 650 0 L 650 450 M 700 0 L 700 450 M 750 0 L 750 450" stroke="#f1f5f9" stroke-width="1"/>
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Muro Exterior -->
  <rect x="150" y="80" width="500" height="280" fill="#ffffff" stroke="#64748b" stroke-width="2" rx="2"/>
  
  <!-- Foundation Line -->
  <line x1="100" y1="360" x2="700" y2="360" stroke="#334155" stroke-width="4"/>
  <rect x="100" y="362" width="600" height="40" fill="#cbd5e1" opacity="0.5"/>
  <text x="400" y="388" font-family="'Inter', sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="1">CALLE / SUELO COMÚN</text>

  <!-- Window representation -->
  <rect x="250" y="120" width="120" height="100" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <line x1="310" y1="120" x2="310" y2="220" stroke="#94a3b8" stroke-width="1"/>
  <line x1="250" y1="170" x2="370" y2="170" stroke="#94a3b8" stroke-width="1"/>

  <!-- Crack / Grieta -->
  <!-- Diagonal crack starting from the window corner down to the foundation -->
  <path d="M 370 220 L 400 245 L 430 260 L 460 295 L 490 320 L 510 360" stroke="#dc2626" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Detail Callout -->
  <circle cx="430" cy="260" r="15" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="3 3"/>
  <line x1="445" y1="260" x2="550" y2="200" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="550" y="170" width="180" height="60" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="4"/>
  <text x="560" y="192" font-family="'Inter', sans-serif" font-size="11" fill="#991b1b" font-weight="600">INCIDENCIA M-01</text>
  <text x="560" y="210" font-family="'Inter', sans-serif" font-size="11" fill="#7f1d1d">Fisura diagonal visible</text>

  <!-- Labels -->
  <text x="170" y="115" font-family="'Inter', sans-serif" font-size="14" fill="#475569" font-weight="600">MURO EXTERIOR - VIVIENDA 1</text>
  <text x="770" y="28" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" font-weight="500" text-anchor="end" letter-spacing="1">REGISTRO FOTOGRÁFICO: INCIDENCIA 1</text>
</svg>
