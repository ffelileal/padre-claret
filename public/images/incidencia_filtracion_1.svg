<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="800" height="450" fill="#f8fafc" rx="8"/>
  <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450 M 450 0 L 450 450 M 500 0 L 500 450 M 550 0 L 550 450 M 600 0 L 600 450 M 650 0 L 650 450 M 700 0 L 700 450 M 750 0 L 750 450" stroke="#f1f5f9" stroke-width="1"/>
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Interior Wall Base Section -->
  <rect x="150" y="80" width="500" height="280" fill="#ffffff" stroke="#64748b" stroke-width="2" rx="2"/>

  <!-- Floor line -->
  <line x1="100" y1="330" x2="700" y2="330" stroke="#475569" stroke-width="3"/>
  <rect x="150" y="330" width="500" height="30" fill="#e2e8f0"/>
  <text x="400" y="350" font-family="'Inter', sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="1">PISO INTERIOR (SECTOR OESTE)</text>

  <!-- Skirting Board / Zócalo -->
  <rect x="150" y="315" width="500" height="15" fill="#94a3b8" stroke="#475569" stroke-width="1"/>

  <!-- Moisture Stain representation (irregular shape at bottom wall) -->
  <path d="M 170 315 
           Q 200 240 230 260 
           Q 270 200 310 230 
           Q 350 250 380 220 
           Q 420 180 460 250 
           Q 510 210 560 280 
           Q 600 260 630 315 Z" fill="#cbd5e1" opacity="0.65" stroke="#94a3b8" stroke-dasharray="2 2" stroke-width="1.5"/>
           
  <!-- Efflorescence / Salitre (small dots or textures) -->
  <circle cx="210" cy="280" r="1.5" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>
  <circle cx="250" cy="290" r="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>
  <circle cx="330" cy="275" r="1.5" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>
  <circle cx="390" cy="295" r="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>
  <circle cx="440" cy="265" r="1" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>
  <circle cx="480" cy="285" r="2" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>
  <circle cx="530" cy="290" r="1.5" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>

  <!-- Moisture Flow Arrows -->
  <path d="M 280 325 L 280 295 M 280 295 L 277 301 M 280 295 L 283 301" stroke="#0284c7" stroke-width="2" fill="none"/>
  <path d="M 450 325 L 450 285 M 450 285 L 447 291 M 450 285 L 453 291" stroke="#0284c7" stroke-width="2" fill="none"/>

  <!-- Labels -->
  <text x="170" y="115" font-family="'Inter', sans-serif" font-size="14" fill="#334155" font-weight="600">MURO INTERIOR - DETALLE DE HUMEDAD</text>
  <text x="170" y="135" font-family="'Inter', sans-serif" font-size="11" fill="#ef4444" font-weight="500">Área afectada por encima del zócalo</text>
  <text x="770" y="28" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" font-weight="500" text-anchor="end" letter-spacing="1">REGISTRO FOTOGRÁFICO: INCIDENCIA 2</text>
</svg>
